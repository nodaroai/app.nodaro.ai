name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please **do not** report
        security vulnerabilities here — see [SECURITY.md](../../security/policy).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. See error
    validations:
      required: true
  - type: dropdown
    id: edition
    attributes:
      label: Edition
      description: Which edition are you running?
      options:
        - Community (self-hosted)
        - Business (self-hosted)
        - Cloud (nodaro.ai hosted)
        - Not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Release tag or `git rev-parse --short HEAD`.
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Node version, Docker vs local — whatever is relevant.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Relevant log output or screenshots. Redact any secrets first.
      render: shell
    validations:
      required: false
