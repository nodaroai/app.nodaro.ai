# Fails any PR that introduces a gitleaks finding, scanning ONLY the PR's own
# commits (base..head), plus full-branch rescans on dev/main pushes.
#
# This is the PR-TIME half of the secret wall — same architecture as
# identity-guard.yml. The mirror gate (scripts/publish-to-public.sh) remains
# the publish-time backstop, but it is scoped to the branch being published
# and fires nightly: the 2026-07-17 incident showed an unscoped mirror scan
# lets any in-flight feature branch block every publish (npm release stalled
# by false positives on a branch pushed 9 minutes earlier), while the author
# only learns about a finding hours later, when the fix is a history rewrite
# of a pushed branch instead of a trivial pre-merge amend.
#
# False positives: append `# gitleaks:allow` (or `// gitleaks:allow`) to the
# flagged line — BEFORE merge, so the marker is part of the commit the scans
# see. Repo-wide allowlist patterns live in .gitleaks.toml.
name: secret-scan
on:
  pull_request: {}
  push:
    branches: [dev, main]
permissions: { contents: read }
jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: install gitleaks (pinned)
        run: |
          set -euo pipefail
          VER=8.30.1
          # Pin + verify the gitleaks release artifact (supply-chain integrity),
          # same pin as mirror-to-public.yml — bump both together.
          SHA256=551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
          curl -sSL -o gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz"
          echo "${SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
      - name: scan
        env:
          # Via env, not inline ${{ }} in the script — branch names are
          # user-controlled input (script-injection surface).
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            # Only the commits this PR would add. HEAD is the PR merge ref, so
            # anything already reachable from the base branch is excluded.
            echo "== PR scan: origin/${BASE_REF}..HEAD =="
            gitleaks detect --no-banner --redact --source . \
              --log-opts="--full-history origin/${BASE_REF}..HEAD"
          else
            # Post-merge / direct-push rescan of the whole published branch —
            # identical scope to the mirror gate, so a finding surfaces here
            # first instead of stalling the nightly publish.
            echo "== push scan: full history of ${GITHUB_REF_NAME} =="
            gitleaks detect --no-banner --redact --source . \
              --log-opts="--full-history ${GITHUB_REF_NAME}"
          fi
