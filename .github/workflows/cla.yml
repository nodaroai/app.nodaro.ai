name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# Permissions required by contributor-assistant/github-action.
# Repo: needs to read PR metadata and write the cla-signed/cla-unsigned label.
# PRs: needs to comment on the PR with the signature prompt and confirm signed status.
# Statuses: needs to set the CLA check status on the PR.
permissions:
  actions: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PERSONAL_ACCESS_TOKEN scoped to nodaroai/cla-signatures so the action
          # can commit signature records there. Create as `CLA_PAT` repo secret.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_PAT }}
        with:
          path-to-signatures: 'signatures/v1/cla.json'
          path-to-document: 'https://github.com/nodaroai/app.nodaro.ai/blob/main/CLA.md'
          # Branch in the signatures repo where signatures are committed.
          branch: 'main'
          # Separate repo for signature storage so PRs here don't carry
          # signature commits in history.
          remote-organization-name: 'nodaroai'
          remote-repository-name: 'cla-signatures'
          # Bots that auto-open PRs (Dependabot, Renovate, etc.) skip signing.
          allowlist: 'dependabot[bot],renovate[bot],github-actions[bot]'
          # The action handles event filtering internally — it inspects
          # the triggering event and fires only on relevant comment bodies.
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-notsigned-prompt: 'Thanks for the contribution! Before merge, please sign the [Nodaro Contributor License Agreement](https://github.com/nodaroai/app.nodaro.ai/blob/main/CLA.md). Reply with `I have read the CLA Document and I hereby sign the CLA` to sign.'
          custom-allsigned-prompt: 'All Contributors have signed the CLA.'

# Operational prerequisites (not enforced by this file):
#   1. Create the private repo nodaroai/cla-signatures with an empty main branch.
#   2. Generate a fine-grained PAT with `contents: write` scoped only to that repo;
#      add it as the `CLA_PAT` secret on this repo.
#   3. Update the path-to-document URL above if the repo is moved or renamed.
