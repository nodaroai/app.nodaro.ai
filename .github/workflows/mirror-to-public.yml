# Nightly gated mirror: internal → public. BUFFERED (scheduled), not per-commit,
# so there's a catch-window before anything is irreversibly public. The job runs
# the leak + secret gate and prints the pending internal→public diff (the "glance"
# record for the window). Manual "publish now" override via the Actions Run button.
# Publishing is token-guarded: until PUBLIC_MIRROR_TOKEN is set it gates + logs the
# delta but does not push. Gate logic lives in scripts/publish-to-public.sh (single
# source, shared with the manual path) so the two can't drift.
name: mirror-to-public
on:
  schedule:
    - cron: '23 3 * * *'   # nightly ~03:23 UTC (off the hour to dodge scheduler load; configurable)
  workflow_dispatch: {}     # manual "publish now" override
permissions: { contents: read }
concurrency:
  group: mirror-to-public
  cancel-in-progress: false
jobs:
  gate-and-mirror:
    # Internal repo only — the public mirror must never mirror to itself.
    if: github.repository == 'nodaroai/app.nodaro.ai-internal'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: install gitleaks (secret gate)
        run: |
          set -euo pipefail
          VER=8.30.1
          # Pin + verify the gitleaks release artifact (supply-chain integrity):
          # sha256 from the official gitleaks_${VER}_checksums.txt. `set -e` fails
          # the step if the download is tampered/corrupted before it is ever run.
          SHA256=551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
          curl -sSL -o gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz"
          echo "${SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
      - name: gate + mirror main and dev
        env:
          TOK: ${{ secrets.PUBLIC_MIRROR_TOKEN }}
          GH_TOK: ${{ github.token }}
        run: |
          # actions/checkout persists a github.com-wide Authorization header using
          # GITHUB_TOKEN (scoped to THIS/internal repo). It overrides our per-URL
          # creds on every github.com git op, so pushing to the PUBLIC repo auths as
          # GITHUB_TOKEN → "Repository not found". Clear it, and re-point origin at an
          # explicit token URL so internal fetches still work.
          git config --local --unset-all http.https://github.com/.extraheader 2>/dev/null || true
          git remote set-url origin "https://x-access-token:${GH_TOK}@github.com/${GITHUB_REPOSITORY}.git"
          if [ -n "${TOK:-}" ]; then
            TOK=$(printf '%s' "$TOK" | tr -d '[:space:]')   # strip stray newline/whitespace from the secret (PATs have none)
            echo "token access check: HTTP $(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: token ${TOK}" https://api.github.com/repos/nodaroai/app.nodaro.ai) — 200=has access, 404=invalid/no access"
            export PUBLIC_REMOTE="https://${TOK}@github.com/nodaroai/app.nodaro.ai.git"
          else
            echo "PUBLIC_MIRROR_TOKEN not set — running gate-only (dry run), no publish."
            echo "Add the token (fine-grained PAT, Contents:RW on nodaroai/app.nodaro.ai) to enable nightly auto-publish."
            export MIRROR_DRY_RUN=1
            export PUBLIC_REMOTE="https://github.com/nodaroai/app.nodaro.ai.git"
          fi
          bash scripts/publish-to-public.sh main
          bash scripts/publish-to-public.sh dev
