name: Release (npm)

# Two-phase changesets release train, split on the dev→main promotion boundary:
#
#   dev push (INTERNAL) → "Version Packages" PR into dev. You merge it where you
#               develop, so changesets are consumed on internal and never reach
#               the public mirror unconsumed.
#   main push (PUBLIC)  → publish unpublished versions to npm, WITH provenance
#               (npm requires a public source repo for provenance). The bumped
#               versions arrive on public via the nightly mirror; a leak gate
#               runs before any package is published.
#
# Publishing authenticates via npm Trusted Publishing (GitHub OIDC) — no token
# stored anywhere. It stays INERT until the repository variable
# NPM_PUBLISH_ENABLED is set to "true" (same dormant-until-configured pattern
# as the CLA bot), which should only happen after a Trusted Publisher is
# configured on npmjs.com for @nodaro/shared, @nodaro/sdk, and @nodaro/cli
# (package Settings → Trusted Publisher → GitHub Actions → this repo + this
# workflow filename: release.yml).

on:
  push:
    branches: [dev, main]
    # Only pushes that can affect a release: new/consumed changesets or a
    # package version bump. Everything else (the vast majority of dev pushes)
    # has nothing to version or publish — skipping them was ~290 no-op runs
    # in 14 days. workflow_dispatch below remains the run-anyway lever.
    paths:
      - ".changeset/**"
      - "packages/*/package.json"
      - ".github/workflows/release.yml"
  # Manual re-run lever: republish any versions missing from the registry
  # (e.g. after an unpublish window) without needing a new commit on main.
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version-pr:
    name: Version Packages PR
    if: github.repository == 'nodaroai/app.nodaro.ai-internal' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the changeset-release/dev branch
      pull-requests: write # open/update the Version Packages PR
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Pin npm 11
        run: corepack enable npm && corepack prepare npm@11.12.1 --activate
      - name: Install workspace dependencies
        run: npm ci
      - name: Open / update the Version Packages PR
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: npx changeset version
          commit: "release: version packages"
          title: "release: version packages"
        env:
          # Use a PAT (not GITHUB_TOKEN) so the Version Packages PR TRIGGERS CI —
          # GitHub suppresses workflow runs on branches/PRs created by GITHUB_TOKEN
          # (recursion guard), which would leave the version PR blocked by the
          # required-check gate. Falls back to GITHUB_TOKEN if RELEASE_PAT is unset.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to npm (OIDC)
    if: github.repository == 'nodaroai/app.nodaro.ai' && github.ref == 'refs/heads/main' && vars.NPM_PUBLISH_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # changesets/action pushes release tags + creates GitHub Releases
      actions: write # dispatch the CLI-binaries workflow when @nodaro/cli publishes
      id-token: write # npm Trusted Publishing (OIDC provenance)
      pull-requests: write # if a changeset ever reaches the mirror's main, changesets/action opens a Version Packages PR instead of publishing — without this it 403s and the publish run fails (see the 2026-07-10 sdk@1.2.0 stall). Lets it degrade gracefully rather than blocking every publish behind a stray changeset.
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Pin npm 11
        run: corepack enable npm && corepack prepare npm@11.12.1 --activate
      - name: Install workspace dependencies
        run: npm ci
      - name: Build publishable packages
        run: |
          npm -w @nodaro/shared run build
          npm -w @nodaro/prompts run build
          npm -w @nodaro/sdk run build
          npm -w @nodaro/cli run build
      - name: Leak gate — block publish if a package carries secrets/IP
        # npm publish is an irreversible PUBLIC exposure, same as a mirror push.
        # Run the same gates before any package leaves for the registry.
        run: |
          set -euo pipefail
          node tools/check-private-leaks.mjs
          node tools/check-pricing-leaks.mjs
          node tools/check-ee-imports.mjs
          VER=8.30.1
          # Pin + verify the gitleaks release artifact (supply-chain integrity):
          # sha256 from the official gitleaks_${VER}_checksums.txt. `set -e` fails
          # the step if the download is tampered/corrupted before it is ever run.
          # Extract OUTSIDE the working tree: the changesets action's fallback
          # version-PR path (stray changeset on the mirror's main) runs `git add .`
          # right after this step, so a binary left in CWD gets committed to
          # changeset-release/main (2026-07-16: public PR #7 carried gitleaks +
          # gitleaks.tar.gz that way).
          SHA256=551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
          GLDIR=$(mktemp -d)
          curl -sSL -o "$GLDIR/gitleaks.tar.gz" "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz"
          echo "${SHA256}  $GLDIR/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf "$GLDIR/gitleaks.tar.gz" -C "$GLDIR" gitleaks
          "$GLDIR/gitleaks" detect --no-banner --redact --source .
      - name: Publish unpublished versions
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: npx changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # SLSA provenance attestations. npm hard-requires a PUBLIC source
          # repository to generate provenance, so this is variable-gated like
          # NPM_PUBLISH_ENABLED — set NPM_PROVENANCE_ENABLED=true together
          # with the public flip; enabling it earlier fails every publish.
          NPM_CONFIG_PROVENANCE: ${{ vars.NPM_PROVENANCE_ENABLED == 'true' }}
      - name: Build CLI binaries for a published @nodaro/cli
        # Tags pushed with GITHUB_TOKEN don't trigger other workflows (GitHub's
        # recursion guard), so dispatch the binaries workflow explicitly.
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          version=$(echo "$PUBLISHED" | jq -r '.[] | select(.name == "@nodaro/cli") | .version')
          if [ -n "$version" ]; then
            echo "Dispatching CLI binaries build for $version"
            gh workflow run cli-release.yml --repo "$GITHUB_REPOSITORY" -f version="$version"
          else
            echo "No @nodaro/cli publish in this batch — skipping binaries"
          fi
