name: CI

on:
  push:
    branches: [main, "feature/**", "fix/**", "feat/**", "refactor/**", "chore/**", "test/**", "docs/**"]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  pull-requests: write

jobs:
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Pin npm 11
        run: corepack enable npm && corepack prepare npm@11.12.1 --activate
      - name: Install workspace dependencies
        run: npm ci
      - name: Build shared packages
        run: npm run build:packages
      - name: Run tests with coverage
        run: npm run test:coverage
        working-directory: frontend
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
      - name: Coverage report
        uses: davelosert/vitest-coverage-report-action@v2
        if: github.event_name == 'pull_request'
        with:
          name: Frontend
          json-summary-path: frontend/coverage/coverage-summary.json
          vite-config-path: frontend/vitest.config.ts

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://test.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: test-key
      EDITION: cloud
      NODE_ENV: test
      YOUTUBE_DL_SKIP_DOWNLOAD: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Pin npm 11
        run: corepack enable npm && corepack prepare npm@11.12.1 --activate
      - name: Install workspace dependencies
        run: npm ci
      - name: Build shared packages
        run: npm run build:packages
      - name: Verify skill content is up to date (gen-skills drift gate)
        run: cd backend && npm run gen:skills:check
        env:
          SUPABASE_URL: https://stub.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: stub-service-role-key
          INTERNAL_ORCHESTRATOR_SECRET: stub-stub-stub-stub-stub-stub-stub-stub-stub
      - name: Run tests with coverage
        run: npm run test:coverage
        working-directory: backend
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/
      - name: Coverage report
        uses: davelosert/vitest-coverage-report-action@v2
        if: github.event_name == 'pull_request'
        with:
          name: Backend
          json-summary-path: backend/coverage/coverage-summary.json
          vite-config-path: backend/vitest.config.ts

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    env:
      YOUTUBE_DL_SKIP_DOWNLOAD: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Pin npm 11
        run: corepack enable npm && corepack prepare npm@11.12.1 --activate
      - name: Install workspace dependencies
        run: npm ci
      - name: Build shared packages
        run: npm run build:packages
      - name: Typecheck frontend
        run: npx tsc --noEmit
        working-directory: frontend
      - name: Typecheck backend
        run: npx tsc --noEmit
        working-directory: backend

  tenant-scope-lint:
    name: Tenant Scope Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Check tenant-scoped queries
        run: node backend/scripts/check-tenant-scope.mjs
      - name: Check admin-client imports
        run: node backend/scripts/check-admin-client-import.mjs

  check-ee-imports:
    name: Check EE Imports
    runs-on: ubuntu-latest
    needs: [frontend-tests, backend-tests, typecheck]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Check core does not import from ee/
        run: node tools/check-ee-imports.mjs

  migrate:
    name: Push Database Migrations
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [frontend-tests, backend-tests, typecheck, tenant-scope-lint, check-ee-imports]
    steps:
      - uses: actions/checkout@v5
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      - name: Push migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
