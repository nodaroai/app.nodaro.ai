name: CI

on:
  # Feature branches are covered by the pull_request event (which tests the
  # merge result), so we DON'T also run on their push — that doubled every PR's
  # CI. `push` is kept only for main (post-merge validation + the migrate gate).
  push:
    branches: [main]
  pull_request:
    branches: [main, dev]

# Cancel a superseded run when a newer commit lands on the same PR/branch.
# main is exempt so a post-merge run (and its migrate job) always completes.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  pull-requests: write

# Skip youtube-dl-exec's postinstall binary download. No CI job executes the
# binary (the backend tests mock youtube-dl-exec), and the upstream CDN
# intermittently 504s — failing `npm ci` and forcing fully-billed reruns.
env:
  YOUTUBE_DL_SKIP_DOWNLOAD: "1"

jobs:
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Pin npm 11
        run: corepack enable npm && corepack prepare npm@11.12.1 --activate
      - name: Install workspace dependencies
        run: npm ci
      - name: Build shared packages
        run: npm run build:packages
      - name: Run tests with coverage
        run: npm run test:coverage
        working-directory: frontend
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
      - name: Coverage report
        uses: davelosert/vitest-coverage-report-action@02f3c2e641286b7fa308cd3e430783103ce6103b # v2
        # Same-repo PRs only: the action posts a sticky PR comment, which needs
        # pull-requests: write — GitHub downgrades the token to read-only on
        # fork PRs, so running there would red-X the job after tests passed.
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        with:
          name: Frontend
          json-summary-path: frontend/coverage/coverage-summary.json
          vite-config-path: frontend/vitest.config.ts

  remotion-tests:
    name: Remotion Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Pin npm 11
        run: corepack enable npm && corepack prepare npm@11.12.1 --activate
      - name: Install workspace dependencies
        run: npm ci
      - name: Build shared packages
        run: npm run build:packages
      - name: Run remotion tests
        run: npm run test
        working-directory: packages/remotion

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://test.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: test-key
      EDITION: cloud
      NODE_ENV: test
      YOUTUBE_DL_SKIP_DOWNLOAD: true
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install ffmpeg (real-ffmpeg e2e tests — assemble-narrated-video, trim-edge-frames)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
      - name: Pin npm 11
        run: corepack enable npm && corepack prepare npm@11.12.1 --activate
      - name: Install workspace dependencies
        run: npm ci
      - name: Build shared packages
        run: npm run build:packages
      - name: Verify skill content is up to date (gen-skills drift gate)
        run: cd backend && npm run gen:skills:check
        env:
          SUPABASE_URL: https://stub.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: stub-service-role-key
          INTERNAL_ORCHESTRATOR_SECRET: stub-stub-stub-stub-stub-stub-stub-stub-stub
      - name: Run tests with coverage
        run: npm run test:coverage
        working-directory: backend
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/
      - name: Coverage report
        uses: davelosert/vitest-coverage-report-action@02f3c2e641286b7fa308cd3e430783103ce6103b # v2
        # Same-repo PRs only: the action posts a sticky PR comment, which needs
        # pull-requests: write — GitHub downgrades the token to read-only on
        # fork PRs, so running there would red-X the job after tests passed.
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        with:
          name: Backend
          json-summary-path: backend/coverage/coverage-summary.json
          vite-config-path: backend/vitest.config.ts

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    env:
      YOUTUBE_DL_SKIP_DOWNLOAD: true
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Pin npm 11
        run: corepack enable npm && corepack prepare npm@11.12.1 --activate
      - name: Install workspace dependencies
        run: npm ci
      - name: Build shared packages
        run: npm run build:packages
      - name: Typecheck frontend
        run: npx tsc --noEmit
        working-directory: frontend
      - name: Typecheck backend
        run: npx tsc --noEmit
        working-directory: backend
      - name: Typecheck CLI
        run: npx tsc --noEmit
        working-directory: packages/cli

  tenant-scope-lint:
    name: Tenant Scope Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Check tenant-scoped queries
        run: node backend/scripts/check-tenant-scope.mjs
      - name: Check admin-client imports
        run: node backend/scripts/check-admin-client-import.mjs

  i18n-completeness:
    name: i18n Locale Completeness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Pin npm 11
        run: corepack enable npm && corepack prepare npm@11.12.1 --activate
      - name: Install workspace dependencies
        run: npm ci
      # The full i18n catalog×locale completeness matrix test lives in
      # @nodaro/shared and was previously never run in CI (only the
      # seasons-scoped .mjs ran), so a missing locale sidecar would silently
      # fall back to English in prod. NOTE: the rest of the @nodaro/shared
      # suite has pre-existing stale failures (model/LLM registry drifted while
      # the suite went un-run in CI) — tracked separately; once those are green,
      # broaden this to `npm run test --workspace=@nodaro/shared`.
      - name: i18n locale completeness (full catalog × locale matrix)
        run: npm run test --workspace=@nodaro/shared -- src/__tests__/i18n-locale-completeness.test.ts

  check-locale-completeness:
    name: Check Locale Completeness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Check locale sidecar completeness
        run: node scripts/check-locale-completeness.mjs

  check-no-internal-specs:
    name: No Internal Specs In Repo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Ensure internal planning docs are not committed
        run: |
          # Internal design/planning docs live in the private plan.nodaro.ai
          # repo, not here. A curated public subset is in docs/design/. This
          # guard keeps them from being re-added to the public repo.
          offenders="$(git ls-files 'specs/' 'docs/superpowers/')"
          if [ -n "$offenders" ]; then
            echo "::error::Internal planning docs must not be committed to the public repo. Move them to the private plan.nodaro.ai repo; curated public design notes belong in docs/design/."
            echo "$offenders"
            exit 1
          fi
          echo "OK: no specs/ or docs/superpowers/ tracked files."

  check-ee-imports:
    name: Check EE Imports
    runs-on: ubuntu-latest
    needs: [frontend-tests, backend-tests, typecheck]
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Check core does not import from ee/
        run: node tools/check-ee-imports.mjs
      - name: Check for private-extraction symbol leaks
        run: node tools/check-private-leaks.mjs

  check-pricing-leaks:
    # packages/shared, packages/prompts, packages/client, and packages/cli are
    # published npm artifacts (Apache-2.0 / FSL) — every release is an
    # IRREVOCABLE grant (npm tarballs can't be un-published). This guards
    # against provider-$ rate figures and platform-margin/markup derivation
    # content leaking into a future release. See the 2026-07-06 public-flip
    # IP audit (S5) in plan.nodaro.ai.
    name: Check Pricing Leaks
    runs-on: ubuntu-latest
    needs: [frontend-tests, backend-tests, typecheck]
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Check packages/*/src for provider-$ / margin-markup leaks
        run: node tools/check-pricing-leaks.mjs

  backend-boot-smoke:
    # Catches startup crashes that vitest masks (e.g. ERR_MODULE_NOT_FOUND from
    # extensionless ESM imports). Compiles backend with tsconfig.build.json and
    # actually starts `node dist/server.js` against stub env vars, checking that
    # /health responds within 45s. If the process exits early or never binds,
    # the job fails — surfacing the exact class of bug that took down prod on
    # 2026-05-21 (Collect node strategies shipped with extensionless imports).
    name: Backend Boot Smoke Test (${{ matrix.edition }})
    runs-on: ubuntu-latest
    needs: [typecheck]
    # Boot under BOTH cloud and community so a fresh self-host clone (the public
    # entry point) is covered — community gates off Stripe/admin via
    # hasCredits()/hasAdmin(), a different startup path than cloud.
    strategy:
      fail-fast: false
      matrix:
        edition: [cloud, community]
    env:
      # Backend env-schema lives in `backend/src/lib/config.ts`. Keep these
      # names in sync — Zod will reject the boot otherwise. SUPABASE_ANON_KEY
      # is NOT in the schema, so we don't set it.
      SUPABASE_URL: https://stub.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: stub-service-role-key
      INTERNAL_ORCHESTRATOR_SECRET: stub-stub-stub-stub-stub-stub-stub-stub-stub
      KIE_API_KEY: stub
      ANTHROPIC_API_KEY: stub
      R2_ACCOUNT_ID: stub
      R2_ACCESS_KEY_ID: stub
      R2_SECRET_ACCESS_KEY: stub
      R2_BUCKET_NAME: stub
      R2_PUBLIC_URL: https://stub.example.com
      EDITION: ${{ matrix.edition }}
      # Public CI is registry-token-free by design (fork PRs), so the private
      # @nodaroai/cloud-plugins package is never installed here — boot cloud in
      # the documented optional mode (warn + continue). Cloud plugin fail-fast
      # is verified in Railway builds + the private repo's pairing CI. The
      # community leg is unaffected (hasCredits() short-circuits the loader).
      PRIVATE_MODULES: optional
      PORT: 9000
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Pin npm 11
        run: corepack enable npm && corepack prepare npm@11.12.1 --activate
      - name: Install workspace dependencies
        run: npm ci
      - name: Build shared packages
        run: npm run build:packages
      - name: Build backend (mirrors production tsc -p tsconfig.build.json)
        run: npx tsc -p tsconfig.build.json
        working-directory: backend
      - name: Boot backend and probe /health
        # NODE_ENV=production only on the actual boot — mirrors prod runtime
        # without breaking the upstream `npm ci` (which prunes devDependencies
        # if NODE_ENV=production is set at job level, leaving tsup missing).
        env:
          NODE_ENV: production
        run: |
          set -e
          cd backend
          node dist/server.js > /tmp/backend.log 2>&1 &
          BACKEND_PID=$!
          echo "Started backend pid=$BACKEND_PID"
          for i in $(seq 1 45); do
            if curl -sf http://127.0.0.1:9000/health > /dev/null 2>&1; then
              echo "Backend booted successfully after ${i}s"
              # Edition-gate runtime assertion: the Stripe webhook route is in
              # the auth-hook PUBLIC whitelist, so its status is a clean
              # registered-vs-absent signal (authed ee routes 401 before
              # routing in both editions and can't discriminate).
              #   community -> ee billing routes must NOT be registered (404)
              #   cloud     -> must be registered (anything but 404)
              WEBHOOK_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://127.0.0.1:9000/v1/billing/stripe-webhook)
              echo "stripe-webhook probe: $WEBHOOK_STATUS (edition: $EDITION)"
              if [ "$EDITION" = "community" ] && [ "$WEBHOOK_STATUS" != "404" ]; then
                echo "FAIL: community edition registered an ee billing route (expected 404, got $WEBHOOK_STATUS)"
                kill $BACKEND_PID 2>/dev/null || true
                exit 1
              fi
              if [ "$EDITION" = "cloud" ] && [ "$WEBHOOK_STATUS" = "404" ]; then
                echo "FAIL: cloud edition did NOT register the ee billing route (got 404)"
                kill $BACKEND_PID 2>/dev/null || true
                exit 1
              fi
              kill $BACKEND_PID 2>/dev/null || true
              exit 0
            fi
            if ! kill -0 $BACKEND_PID 2>/dev/null; then
              echo "Backend process exited prematurely (startup crash)."
              echo "---- backend log ----"
              cat /tmp/backend.log
              echo "---------------------"
              exit 1
            fi
            sleep 1
          done
          echo "Backend did not respond to /health within 45s -- listener never bound."
          echo "---- backend log ----"
          cat /tmp/backend.log
          echo "---------------------"
          kill $BACKEND_PID 2>/dev/null || true
          exit 1

  migrate:
    name: Push Database Migrations
    runs-on: ubuntu-latest
    if: github.repository == 'nodaroai/app.nodaro.ai-internal' && github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [frontend-tests, backend-tests, typecheck, tenant-scope-lint, check-locale-completeness, check-ee-imports, check-pricing-leaks, i18n-completeness, backend-boot-smoke]
    env:
      # Disable CLI telemetry. The CLI flushes anonymous PostHog analytics on
      # exit; on a runner that flush can time out and surface as a spurious
      # exit 1 *after* the command already succeeded ("Finished supabase link."
      # → "Timeout while shutting down PostHog. Some events may not have been
      # sent." → exit 1). A failed link step silently skips `db push`, so prod
      # never gets the migrations. No telemetry client = nothing to flush =
      # no timeout. Gated by canSend() in supabase/cli telemetry/service.go.
      # Set at job level so the push step is covered too.
      SUPABASE_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1 # v1
        with:
          # Pin the CLI — `latest` is non-deterministic across runs (a build
          # that propagates the telemetry-shutdown error to the exit code can
          # break prod migrations on one merge while the next merge passes).
          version: 2.105.0
      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      - name: Push migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  changeset-guard:
    name: Changeset Guard
    # Every PR that changes a published package must carry a changeset, so the
    # release train (release.yml) learns about it. Escape hatch for changes
    # that genuinely need no release note: `npx changeset --empty`.
    # Skipped for the release train's own PRs (version PR consumes changesets;
    # dev→main promos carry already-consumed ones).
    if: github.event_name == 'pull_request' && github.head_ref != 'dev' && !startsWith(github.head_ref, 'changeset-release/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Require a changeset when published packages change
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          pkg_changes=$(git diff --name-only "$BASE_SHA"..."$HEAD_SHA" -- \
            packages/shared packages/client packages/cli | grep -v CHANGELOG.md || true)
          if [ -z "$pkg_changes" ]; then
            echo "No published-package changes — guard not applicable."
            exit 0
          fi
          added_changesets=$(git diff --name-only --diff-filter=A "$BASE_SHA"..."$HEAD_SHA" -- \
            '.changeset/*.md' | grep -v README.md || true)
          if [ -n "$added_changesets" ]; then
            echo "Package changes covered by changeset(s):"
            echo "$added_changesets"
            exit 0
          fi
          echo "::error::This PR changes published packages but adds no changeset."
          echo "Changed package files:"
          echo "$pkg_changes"
          echo ""
          echo "Add one with:  npx changeset        (pick bump level + write a note)"
          echo "Or, if this change needs no release:  npx changeset --empty"
          exit 1

  # ffmpeg OUTPUT characterization — renders synthetic lavfi fixtures through
  # every ffmpeg-backed operation (backend/src/providers/video) and compares
  # measured properties of the DECODED output against committed golden values
  # (backend/src/providers/video/__characterization__/golden/). This is the
  # net the arg-string tests cannot be: a 6 dB rendered-output change (the
  # afir ×2→×1 incident) is invisible to them and CI stayed green through it.
  #
  # It runs inside node:22-slim with the SAME sha256-pinned static ffmpeg
  # tarball as the production image (Dockerfile ARG FFMPEG_TARBALL_URL_AMD64 /
  # _SHA256_AMD64, parsed below so the pin has one source of truth) — NEVER on
  # the bare runner, whose preinstalled ffmpeg is a different version and
  # would bless/verify the wrong numbers. A download or checksum failure fails
  # this job loudly — the same deliberate failure mode as the production
  # docker build. Bump the pins, re-bless the golden inside the new image
  # (backend/scripts/characterize-in-image.sh bless), review the report diff,
  # and ship all of it in one PR.
  characterize:
    name: FFmpeg Output Characterization
    runs-on: ubuntu-latest
    container: node:22-slim
    env:
      YOUTUBE_DL_SKIP_DOWNLOAD: true
      # node:22-slim has no python; youtube-dl-exec's preinstall probes for it
      # (bare-runner jobs never see this — GitHub runners ship python).
      YOUTUBE_DL_SKIP_PYTHON_CHECK: 1
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Install the production-pinned ffmpeg + fonts (via tools/install-pinned-ffmpeg.sh)
        run: |
          # Same binary as production, one source of truth: the Dockerfile's
          # static-tarball pin, parsed and installed by the SAME script the
          # Dockerfile and characterize-in-image.sh use. The script hard-errors
          # if the pin can't be resolved — installing anything else would
          # bless/verify goldens against the wrong binary.
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends \
            curl ca-certificates xz-utils fontconfig fonts-dejavu-core fonts-liberation
          bash tools/install-pinned-ffmpeg.sh --from-dockerfile Dockerfile --arch amd64
      - name: Pin npm version
        run: corepack enable npm && corepack prepare npm@11.12.1 --activate
      - name: Install dependencies
        run: npm ci
      - name: Build workspace packages
        run: npm run build:packages
      - name: Characterization check (decoded-output goldens)
        working-directory: backend
        run: npm run characterize:check
