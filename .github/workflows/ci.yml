name: CI

on:
  push:
    branches: [main, "feature/**", "fix/**", "feat/**", "refactor/**", "chore/**", "test/**", "docs/**"]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  pull-requests: write

jobs:
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Pin npm 11
        run: corepack enable npm && corepack prepare npm@11.12.1 --activate
      - name: Install workspace dependencies
        run: npm ci
      - name: Build shared packages
        run: npm run build:packages
      - name: Run tests with coverage
        run: npm run test:coverage
        working-directory: frontend
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
      - name: Coverage report
        uses: davelosert/vitest-coverage-report-action@v2
        if: github.event_name == 'pull_request'
        with:
          name: Frontend
          json-summary-path: frontend/coverage/coverage-summary.json
          vite-config-path: frontend/vitest.config.ts

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://test.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: test-key
      EDITION: cloud
      NODE_ENV: test
      YOUTUBE_DL_SKIP_DOWNLOAD: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Pin npm 11
        run: corepack enable npm && corepack prepare npm@11.12.1 --activate
      - name: Install workspace dependencies
        run: npm ci
      - name: Build shared packages
        run: npm run build:packages
      - name: Verify skill content is up to date (gen-skills drift gate)
        run: cd backend && npm run gen:skills:check
        env:
          SUPABASE_URL: https://stub.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: stub-service-role-key
          INTERNAL_ORCHESTRATOR_SECRET: stub-stub-stub-stub-stub-stub-stub-stub-stub
      - name: Run tests with coverage
        run: npm run test:coverage
        working-directory: backend
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/
      - name: Coverage report
        uses: davelosert/vitest-coverage-report-action@v2
        if: github.event_name == 'pull_request'
        with:
          name: Backend
          json-summary-path: backend/coverage/coverage-summary.json
          vite-config-path: backend/vitest.config.ts

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    env:
      YOUTUBE_DL_SKIP_DOWNLOAD: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Pin npm 11
        run: corepack enable npm && corepack prepare npm@11.12.1 --activate
      - name: Install workspace dependencies
        run: npm ci
      - name: Build shared packages
        run: npm run build:packages
      - name: Typecheck frontend
        run: npx tsc --noEmit
        working-directory: frontend
      - name: Typecheck backend
        run: npx tsc --noEmit
        working-directory: backend

  tenant-scope-lint:
    name: Tenant Scope Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Check tenant-scoped queries
        run: node backend/scripts/check-tenant-scope.mjs
      - name: Check admin-client imports
        run: node backend/scripts/check-admin-client-import.mjs

  i18n-completeness:
    name: i18n Locale Completeness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Pin npm 11
        run: corepack enable npm && corepack prepare npm@11.12.1 --activate
      - name: Install workspace dependencies
        run: npm ci
      # The full i18n catalog×locale completeness matrix test lives in
      # @nodaro/shared and was previously never run in CI (only the
      # seasons-scoped .mjs ran), so a missing locale sidecar would silently
      # fall back to English in prod. NOTE: the rest of the @nodaro/shared
      # suite has pre-existing stale failures (model/LLM registry drifted while
      # the suite went un-run in CI) — tracked separately; once those are green,
      # broaden this to `npm run test --workspace=@nodaro/shared`.
      - name: i18n locale completeness (full catalog × locale matrix)
        run: npm run test --workspace=@nodaro/shared -- src/__tests__/i18n-locale-completeness.test.ts

  check-locale-completeness:
    name: Check Locale Completeness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Check locale sidecar completeness
        run: node scripts/check-locale-completeness.mjs

  check-ee-imports:
    name: Check EE Imports
    runs-on: ubuntu-latest
    needs: [frontend-tests, backend-tests, typecheck]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Check core does not import from ee/
        run: node tools/check-ee-imports.mjs

  backend-boot-smoke:
    # Catches startup crashes that vitest masks (e.g. ERR_MODULE_NOT_FOUND from
    # extensionless ESM imports). Compiles backend with tsconfig.build.json and
    # actually starts `node dist/server.js` against stub env vars, checking that
    # /health responds within 45s. If the process exits early or never binds,
    # the job fails — surfacing the exact class of bug that took down prod on
    # 2026-05-21 (Collect node strategies shipped with extensionless imports).
    name: Backend Boot Smoke Test
    runs-on: ubuntu-latest
    needs: [typecheck]
    env:
      # Backend env-schema lives in `backend/src/lib/config.ts`. Keep these
      # names in sync — Zod will reject the boot otherwise. SUPABASE_ANON_KEY
      # is NOT in the schema, so we don't set it.
      SUPABASE_URL: https://stub.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: stub-service-role-key
      INTERNAL_ORCHESTRATOR_SECRET: stub-stub-stub-stub-stub-stub-stub-stub-stub
      KIE_API_KEY: stub
      ANTHROPIC_API_KEY: stub
      R2_ACCOUNT_ID: stub
      R2_ACCESS_KEY_ID: stub
      R2_SECRET_ACCESS_KEY: stub
      R2_BUCKET_NAME: stub
      R2_PUBLIC_URL: https://stub.example.com
      EDITION: cloud
      PORT: 9000
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Pin npm 11
        run: corepack enable npm && corepack prepare npm@11.12.1 --activate
      - name: Install workspace dependencies
        run: npm ci
      - name: Build shared packages
        run: npm run build:packages
      - name: Build backend (mirrors production tsc -p tsconfig.build.json)
        run: npx tsc -p tsconfig.build.json
        working-directory: backend
      - name: Boot backend and probe /health
        # NODE_ENV=production only on the actual boot — mirrors prod runtime
        # without breaking the upstream `npm ci` (which prunes devDependencies
        # if NODE_ENV=production is set at job level, leaving tsup missing).
        env:
          NODE_ENV: production
        run: |
          set -e
          cd backend
          node dist/server.js > /tmp/backend.log 2>&1 &
          BACKEND_PID=$!
          echo "Started backend pid=$BACKEND_PID"
          for i in $(seq 1 45); do
            if curl -sf http://127.0.0.1:9000/health > /dev/null 2>&1; then
              echo "Backend booted successfully after ${i}s"
              kill $BACKEND_PID 2>/dev/null || true
              exit 0
            fi
            if ! kill -0 $BACKEND_PID 2>/dev/null; then
              echo "Backend process exited prematurely (startup crash)."
              echo "---- backend log ----"
              cat /tmp/backend.log
              echo "---------------------"
              exit 1
            fi
            sleep 1
          done
          echo "Backend did not respond to /health within 45s -- listener never bound."
          echo "---- backend log ----"
          cat /tmp/backend.log
          echo "---------------------"
          kill $BACKEND_PID 2>/dev/null || true
          exit 1

  migrate:
    name: Push Database Migrations
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [frontend-tests, backend-tests, typecheck, tenant-scope-lint, check-locale-completeness, check-ee-imports, i18n-completeness]
    steps:
      - uses: actions/checkout@v5
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      - name: Push migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
