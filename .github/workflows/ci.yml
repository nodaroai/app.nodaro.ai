name: CI

on:
  push:
    branches: [main, "feature/**", "fix/**", "feat/**", "refactor/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Run tests with coverage
        run: npm run test:coverage
        working-directory: frontend
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
      - name: Coverage report
        uses: davelosert/vitest-coverage-report-action@v2
        if: github.event_name == 'pull_request'
        with:
          name: Frontend
          json-summary-path: frontend/coverage/coverage-summary.json
          vite-config-path: frontend/vitest.config.ts

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://test.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: test-key
      EDITION: cloud
      NODE_ENV: test
      YOUTUBE_DL_SKIP_DOWNLOAD: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: backend
      - name: Run tests with coverage
        run: npm run test:coverage
        working-directory: backend
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/
      - name: Coverage report
        uses: davelosert/vitest-coverage-report-action@v2
        if: github.event_name == 'pull_request'
        with:
          name: Backend
          json-summary-path: backend/coverage/coverage-summary.json
          vite-config-path: backend/vitest.config.ts

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    env:
      YOUTUBE_DL_SKIP_DOWNLOAD: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Install remotion package dependencies
        run: npm ci
        working-directory: packages/remotion
      - name: Install backend dependencies
        run: npm ci
        working-directory: backend
      - name: Typecheck frontend
        run: npx tsc --noEmit
        working-directory: frontend
      - name: Typecheck backend
        run: npx tsc --noEmit
        working-directory: backend

  tenant-scope-lint:
    name: Tenant Scope Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check tenant-scoped queries
        run: node backend/scripts/check-tenant-scope.mjs
      - name: Check admin-client imports
        run: node backend/scripts/check-admin-client-import.mjs

  migrate:
    name: Push Database Migrations
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [frontend-tests, backend-tests, typecheck, tenant-scope-lint]
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      - name: Push migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
