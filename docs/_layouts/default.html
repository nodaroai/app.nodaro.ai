<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  {% seo title=false %}
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:        #ff0073;
      --accent-dim:    rgba(255, 0, 115, 0.15);
      --bg:            #0a0a0f;
      --bg-card:       #111118;
      --bg-card-hover: #16161f;
      --border:        rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.14);
      --text-primary:  #f0f0f5;
      --text-secondary:#8888aa;
      --text-muted:    #55556a;
      --mono:          'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      --sans:          'Inter', system-ui, -apple-system, sans-serif;
    }

    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.65;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Top nav */
    .nav {
      position: sticky; top: 0; z-index: 10;
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: saturate(140%) blur(12px);
      -webkit-backdrop-filter: saturate(140%) blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 920px; margin: 0 auto;
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .brand {
      color: var(--text-primary);
      text-decoration: none;
      font-weight: 700;
      letter-spacing: -0.01em;
      font-size: 15px;
    }
    .brand span { color: var(--accent); }
    .nav-links { display: flex; gap: 22px; }
    .nav-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.15s ease;
    }
    .nav-links a:hover { color: var(--text-primary); }
    @media (max-width: 560px) {
      .nav-links a:not(:last-child) { display: none; }
    }

    /* Article */
    main { max-width: 760px; margin: 0 auto; padding: 56px 24px 80px; }
    article > *:first-child { margin-top: 0; }

    h1, h2, h3, h4, h5, h6 {
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      line-height: 1.25;
      margin: 2em 0 0.6em;
    }
    h1 { font-size: clamp(1.9rem, 2vw + 1.2rem, 2.4rem); margin-top: 0; letter-spacing: -0.03em; }
    h2 { font-size: 1.55rem; padding-bottom: 0.35em; border-bottom: 1px solid var(--border); }
    h3 { font-size: 1.2rem; }
    h4 { font-size: 1.02rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.04em; }

    p, ul, ol, blockquote, table, pre { margin: 0 0 1.15em; }

    a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.15s ease; }
    a:hover { border-bottom-color: var(--accent); }

    ul, ol { padding-left: 1.4em; }
    li { margin-bottom: 0.4em; }
    li > ul, li > ol { margin: 0.4em 0; }

    blockquote {
      border-left: 3px solid var(--accent);
      padding: 0.4em 1.1em;
      color: var(--text-secondary);
      background: var(--accent-dim);
      border-radius: 0 8px 8px 0;
    }
    blockquote > p:last-child { margin-bottom: 0; }

    code {
      font-family: var(--mono);
      font-size: 0.86em;
      background: var(--bg-card);
      padding: 0.15em 0.42em;
      border-radius: 5px;
      border: 1px solid var(--border);
      color: #ffd6e7;
    }
    pre {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      overflow-x: auto;
      font-size: 0.86rem;
      line-height: 1.55;
    }
    pre code {
      background: none; padding: 0; border: 0; color: var(--text-primary);
      font-size: inherit;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.92rem;
      display: block;
      overflow-x: auto;
    }
    th, td { text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: top; }
    th { color: var(--text-secondary); font-weight: 600; background: rgba(255,255,255,0.025); }

    hr { border: 0; border-top: 1px solid var(--border); margin: 2em 0; }
    img { max-width: 100%; height: auto; border-radius: 8px; }

    /* Footer */
    footer {
      max-width: 760px; margin: 0 auto;
      padding: 24px;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 13px;
      display: flex; justify-content: space-between; gap: 16px; flex-wrap: wrap;
    }
    footer a { color: var(--text-secondary); border-bottom: 0; }
    footer a:hover { color: var(--text-primary); border-bottom: 0; }

    /* Rouge syntax highlighting (subset, dark) */
    .highlight .c, .highlight .c1, .highlight .cm, .highlight .cs { color: var(--text-muted); font-style: italic; }
    .highlight .k, .highlight .kc, .highlight .kd, .highlight .kn, .highlight .kp, .highlight .kr, .highlight .kt { color: #ff79c6; }
    .highlight .s, .highlight .s1, .highlight .s2, .highlight .sb, .highlight .sc, .highlight .sd, .highlight .se, .highlight .sh, .highlight .si, .highlight .sx, .highlight .sr, .highlight .ss { color: #f1fa8c; }
    .highlight .nf, .highlight .nb, .highlight .nc { color: #50fa7b; }
    .highlight .mi, .highlight .mf, .highlight .mh, .highlight .mo { color: #bd93f9; }
    .highlight .o, .highlight .ow { color: #ff79c6; }
    .highlight .nt { color: var(--accent); }
    .highlight .na { color: #50fa7b; }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a class="brand" href="{{ site.baseurl }}/">Nodaro<span>.ai</span> &nbsp;Docs</a>
      <div class="nav-links">
        <a href="{{ site.baseurl }}/nodes/README.html">Nodes</a>
        <a href="{{ site.baseurl }}/sdk-quickstart.html">SDK</a>
        <a href="{{ site.baseurl }}/api-integration.html">API</a>
        <a href="https://github.com/nodaroai/app.nodaro.ai">GitHub</a>
      </div>
    </div>
  </nav>

  <main>
    <article>
      {{ content }}
    </article>
  </main>

  <footer>
    <div>&copy; Nodaro.ai &middot; <a href="{{ site.baseurl }}/">Docs home</a></div>
    {% if page.path %}
      <div><a href="{{ site.baseurl }}/{{ page.path }}" title="LLM-friendly raw markdown">View as raw markdown &rarr;</a></div>
    {% endif %}
  </footer>
</body>
</html>
